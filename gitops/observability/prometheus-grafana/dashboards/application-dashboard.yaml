apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-application
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  application-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_workload_namespace=\"yola\"}[5m])) by (destination_workload)",
              "legendFormat": "{{destination_workload}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Error Rate (%)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_workload_namespace=\"yola\",response_code=~\"5.*\"}[5m])) by (destination_workload) / sum(rate(istio_requests_total{destination_workload_namespace=\"yola\"}[5m])) by (destination_workload) * 100",
              "legendFormat": "5xx {{destination_workload}}",
              "refId": "A"
            },
            {
              "expr": "sum(rate(istio_requests_total{destination_workload_namespace=\"yola\",response_code=~\"4.*\"}[5m])) by (destination_workload) / sum(rate(istio_requests_total{destination_workload_namespace=\"yola\"}[5m])) by (destination_workload) * 100",
              "legendFormat": "4xx {{destination_workload}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          }
        },
        {
          "title": "Latency P50 / P95 / P99 (ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{destination_workload_namespace=\"yola\"}[5m])) by (le, destination_workload))",
              "legendFormat": "p50 {{destination_workload}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_workload_namespace=\"yola\"}[5m])) by (le, destination_workload))",
              "legendFormat": "p95 {{destination_workload}}",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{destination_workload_namespace=\"yola\"}[5m])) by (le, destination_workload))",
              "legendFormat": "p99 {{destination_workload}}",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 5 }
            }
          }
        },
        {
          "title": "HTTP Requests by Status Code",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"yola\"}[5m])) by (statusCode)",
              "legendFormat": "{{statusCode}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 50, "stacking": { "mode": "normal" } }
            },
            "overrides": [
              { "matcher": { "id": "byRegexp", "options": "^2.*" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byRegexp", "options": "^4.*" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
              { "matcher": { "id": "byRegexp", "options": "^5.*" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          }
        },
        {
          "title": "HTTP Requests by Method & Route",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"yola\"}[5m])) by (method, route)",
              "legendFormat": "{{method}} {{route}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Expenses Total",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "expenses_total{namespace=\"yola\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            }
          }
        },
        {
          "title": "MongoDB Connection Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "mongo_connection_status{namespace=\"yola\"}",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "Disconnected", "color": "red" }, "1": { "text": "Connected", "color": "green" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "title": "Request Duration Heatmap",
          "type": "heatmap",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(istio_request_duration_milliseconds_bucket{destination_workload_namespace=\"yola\"}[5m])) by (le)",
              "legendFormat": "{{le}}",
              "refId": "A",
              "format": "heatmap"
            }
          ],
          "options": {
            "calculate": false,
            "yAxis": { "unit": "ms" }
          }
        },
        {
          "title": "Top Slow Routes (P99)",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "topk(10, histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{destination_workload_namespace=\"yola\"}[5m])) by (le, destination_workload, request_protocol)))",
              "legendFormat": "{{request_protocol}} {{destination_workload}}",
              "refId": "A",
              "format": "table",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ms" }
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "Value": "P99 Latency (ms)", "destination_workload": "Service", "request_protocol": "Protocol" } } }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["application", "yola"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Expensy Application",
      "uid": "yola-app",
      "version": 1
    }
