apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istio-monitor
  namespace: monitoring
  labels:
    release: prometheus-grafana # Matches prometheus release to be picked up
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - istiod
          - istio-ingressgateway
  namespaceSelector:
    matchNames:
      - istio-system
  endpoints:
    - port: http-monitoring # Port for istiod telemetry
      interval: 15s
    - port: http-envoy-prom # Port for ingressgateway telemetry
      interval: 15s
