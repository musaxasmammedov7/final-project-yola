# yaml-language-server: $schema=https://www.schemastore.org/any.json
#
# ExternalSecret для SMTP-пароля Falcosidekick из Azure Key Vault.
# Автоматически создает Kubernetes Secret 'falco-smtp-secret' в namespace falco
# с ключом SMTP_PASSWORD.
# Синхронизируется из Terraform: terraform/secrets.tf (random_password.falco_smtp_password)
#
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: falco-smtp-secret
  namespace: falco
  labels:
    app.kubernetes.io/part-of: falco
    app.kubernetes.io/component: falcosidekick
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-backend
    kind: ClusterSecretStore
  target:
    name: falco-smtp-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: falco-smtp-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
