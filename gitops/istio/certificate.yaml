apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yola-certificate
  namespace: istio-system
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: yola-istio-ingress.swedencentral.cloudapp.azure.com
  dnsNames:
    - yola-istio-ingress.swedencentral.cloudapp.azure.com
  secretName: yola-tls-cert
