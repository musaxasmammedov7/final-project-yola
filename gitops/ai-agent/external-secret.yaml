apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-agent-openai-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault-backend
    kind: ClusterSecretStore
  target:
    name: ai-agent-openai-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: azure-openai-key
    - secretKey: endpoint
      remoteRef:
        key: azure-openai-endpoint
    - secretKey: telegram-token
      remoteRef:
        key: alertmanager-telegram-token
