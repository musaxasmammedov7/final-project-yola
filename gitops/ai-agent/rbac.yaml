apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agent
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "events", "services", "endpoints", "persistentvolumeclaims", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-agent
subjects:
  - kind: ServiceAccount
    name: ai-agent
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: ai-agent
  apiGroup: rbac.authorization.k8s.io
