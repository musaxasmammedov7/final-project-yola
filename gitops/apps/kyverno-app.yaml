apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    # sync-wave: "0" — Kyverno controller устанавливается в первой волне
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    # Указываем конкретную стабильную версию 3.2.6.
    targetRevision: 3.2.6
    helm:
      values: |
        # === Cleanup отключён ===
        # bitnami/kubectl:1.28.5 удалён с Docker Hub (миграция Bitnami в bitnamilegacy/*
        # в августе 2025). Отключаем cleanup-контроллер и все cleanup-джобы,
        # так как они не критичны — только удаляют старые отчёты при превышении порога.
        cleanupController:
          enabled: false
        cleanupJobs:
          admissionReports:
            enabled: false
          clusterAdmissionReports:
            enabled: false
          ephemeralReports:
            enabled: false
          clusterEphemeralReports:
            enabled: false
          updateRequests:
            enabled: false
        policyReportsCleanup:
          enabled: false
        webhooksCleanup:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Kyverno CRD объекты могут быть большими, server-side apply избегает ошибки
      # 'metadata.annotations: Too long: must have at most 262144 characters',
      # типичной для client-side apply больших CRD.
      - ServerSideApply=true