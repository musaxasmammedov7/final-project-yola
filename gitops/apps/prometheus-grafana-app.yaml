apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-grafana
  namespace: argocd
  annotations:
    # sync-wave: "1" — prometheus-grafana устанавливается во второй волне
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 60.0.0
      helm:
        valueFiles:
          - $values/gitops/observability/prometheus-grafana/values.yaml
    - repoURL: https://github.com/musaxasmammedov7/final-project-yola.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/musaxasmammedov7/final-project-yola.git
      targetRevision: main
      path: gitops/observability/prometheus-grafana
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - namespaceLabels=pod-security.kubernetes.io/enforce=baseline,pod-security.kubernetes.io/warn=restricted,pod-security.kubernetes.io/audit=restricted
    ignoreDifferences:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /metadata/annotations 
