image:
  registry: docker.io
  repository: bitnamilegacy/redis
  tag: 7.2.4-debian-12-r9

# Использование существующего секрета, сгенерированного External Secrets Operator.
auth:
  enabled: true
  existingSecret: redis-password-secret
  existingSecretKey: redis-password

architecture: standalone

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001

master:
  persistence:
    enabled: true
    storageClass: yola-azure-disk
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
  podAnnotations:
    sidecar.istio.io/inject: "false"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
  serviceAccount:
    # Redis не вызывает Kubernetes API, токен ServiceAccount не нужен — отключаем монтирование, чтобы при компрометации контейнера атакующий не получил токен с правами в Kubernetes API
    automountServiceAccountToken: false

slave:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001

fullnameOverride: yola-redis

# Bitnami Redis chart поддерживает встроенный sidecar-exporter (prometheus-redis-exporter) внутри того же Pod — metrics.enabled: true добавляет этот sidecar автоматически, без необходимости ставить отдельный Helm release. metrics.serviceMonitor.enabled: true заставляет чарт самостоятельно создать ServiceMonitor ресурс (нужен Prometheus Operator CRD в кластере — он уже есть благодаря kube-prometheus-stack). namespace: monitoring указывает, в каком namespace создать сам ServiceMonitor объект — ставим в monitoring, где живёт Prometheus, а не в yola, для логичного разделения 'инфраструктура мониторинга' vs 'само приложение'.
metrics:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis-exporter
    tag: 1.58.0-debian-12-r4
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
