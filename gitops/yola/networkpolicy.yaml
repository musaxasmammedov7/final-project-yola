        - podSelector:
            matchLabels:
              app: yola-mongo-svc
      ports:
        - protocol: TCP
          port: 27017
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-redis
  namespace: yola
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: yola-redis
  policyTypes:
    - Ingress
  ingress:
    # Redis остаётся на Bitnami Helm chart, использует labels: app.kubernetes.io/instance=yola-redis
    # ПРОВЕРИТЬ ПОСЛЕ ДЕПЛОЯ: выполнить kubectl get pods -n yola --show-labels и убедиться, что селектор совпадает.
    - from:
        - podSelector:
            matchLabels:
              app: yola-backend
      ports:
        - protocol: TCP
          port: 6379
---
