---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mongo-egress-to-apiserver
  namespace: yola
spec:
  podSelector:
    matchLabels:
      app: yola-mongo-svc
  policyTypes:
    - Egress
  egress:
    # MongoDB Community Agent обращается к Kubernetes API server (10.0.0.1:443)
    # для получения конфигурации replica set. Вместо 0.0.0.0/0 ограничиваем
    # service CIDR кластера (10.0.0.0/16) — сюда входят все ClusterIP сервисы,
    # включая API server.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 443
