apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: yola
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: yola
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-istio-control-plane-egress
  namespace: yola
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # КРИТИЧНО: Envoy sidecar (istio-proxy), автоматически инжектируемый в каждый Pod благодаря istio-injection: enabled на namespace, должен непрерывно общаться с istiod в namespace istio-system на портах 15012 (XDS), 15010 (legacy XDS gRPC) и 15014 (Pilot debug/monitoring). Без этого правила Envoy sidecar не получит конфигурацию маршрутизации от control plane, и поды зависнут — readinessProbe будет фейлить бесконечно, даже если основной контейнер приложения полностью здоров. Разрешаем ВЕСЬ egress на istio-system (не точечные порты), потому что набор служебных портов Istio может отличаться между версиями — широкое правило надёжнее, чем хардкодить список портов, который может стать неактуальным после обновления Istio.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: yola
spec:
  podSelector:
    matchLabels:
      app: yola-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: yola-frontend
      ports:
        - protocol: TCP
          port: 8706
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress-to-backend
  namespace: yola
spec:
  podSelector:
    matchLabels:
      app: yola-frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: yola-backend
      ports:
        - protocol: TCP
          port: 8706
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-mongo
  namespace: yola
spec:
  podSelector:
    matchLabels:
      app: yola-mongo-svc
  policyTypes:
    - Ingress
  ingress:
    # MongoDB Community Operator обычно присваивает labels: app=yola-mongo-svc, statefulset.kubernetes.io/pod-name=yola-mongo-N и т.д.
    # ПРОВЕРИТЬ ПОСЛЕ ДЕПЛОЯ: выполнить kubectl get pods -n yola --show-labels и убедиться, что selectors совпадают.
    - from:
        - podSelector:
            matchLabels:
              app: yola-backend
      ports:
        - protocol: TCP
          port: 27017
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
