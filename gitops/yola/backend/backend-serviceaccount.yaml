apiVersion: v1
kind: ServiceAccount
metadata:
  name: yola-backend-sa
  namespace: yola
# Backend не вызывает Kubernetes API программно — отключаем монтирование токена, чтобы при компрометации контейнера (например через RCE в зависимости) атакующий не получил доступ к Kubernetes API через токен default ServiceAccount.
automountServiceAccountToken: false
