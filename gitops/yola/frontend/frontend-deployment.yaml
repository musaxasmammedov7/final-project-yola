apiVersion: apps/v1
kind: Deployment
metadata:
  name: yola-frontend
  namespace: yola
  labels:
    app: yola-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yola-frontend
  template:
    metadata:
      labels:
        app: yola-frontend
    spec:
      serviceAccountName: yola-frontend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - yola-frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: yolaprod.azurecr.io/yola-frontend:cc1b3a9c099ef4cf912473340666581fe2c18878
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: yola-frontend-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: next-cache-volume
              mountPath: /app/.next/cache
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: tmp-volume
          emptyDir: {}
        # Next.js в production режиме (next start) пишет runtime кэш в .next/cache — с readOnlyRootFilesystem: true нужен этот дополнительный volume, иначе приложение упадёт при попытке записи кэша.
        - name: next-cache-volume
          emptyDir: {}
