name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "expensy_frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "expensy_frontend/**"
  workflow_dispatch:

env:
  ACR_NAME: yolaprod
  ACR_LOGIN_SERVER: yolaprod.azurecr.io
  IMAGE_NAME: yolaprod.azurecr.io/yola-frontend

jobs:
  ci:
    name: Build · Scan · Push · Sign
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно для коммита обновлённого GitOps манифеста
      id-token: write  # нужно для Cosign

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      # fetch-depth: 0 — полная история нужна SonarCloud для корректного анализа.
      # Без этого SonarCloud не видит изменения относительно base branch.
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CI_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 2. Setup Node.js ──────────────────────────────────────────────────
      # Делаем ПЕРВЫМ перед любой npm командой — настраивает:
      # - нужную версию Node (20) вместо дефолтной Node 24 на runner'е
      # - кэш npm по package-lock.json (ускоряет последующие запуски в ~3x)
      # - добавляет node/npm в PATH runner'а
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: expensy_frontend/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────
      # npm ci — строгая установка строго по package-lock.json (воспроизводимо).
      # --legacy-peer-deps нужен из-за конфликтов peer dependencies в Next.js экосистеме.
      # Устанавливаем ОДИН РАЗ — Snyk, build и Trivy используют эти же node_modules.
      - name: Install dependencies
        working-directory: expensy_frontend
        run: npm ci --legacy-peer-deps

      # ── 4. SonarCloud — статический анализ кода ───────────────────────────
      - name: SonarCloud – Code analysis
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: expensy_frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # ── 5. Snyk — сканирование зависимостей ──────────────────────────────
      # Проверяет node_modules на известные CVE уязвимости.
      # Использует уже установленные node_modules из шага 3 — повторный npm ci не нужен.
      # exit-code встроен в severity-threshold — падает только на HIGH и выше.
      - name: Snyk – Scan dependencies
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --file=expensy_frontend/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Typecheck
        working-directory: expensy_frontend
        run: npm run typecheck

      - name: Lint
        working-directory: expensy_frontend
        run: npm run lint

      # ── 6. Build (Next.js) ────────────────────────────────────────────────
      # Собираем production build перед сборкой Docker образа.
      # NEXT_TELEMETRY_DISABLED отключает телеметрию Next.js в CI.
      - name: Build (Next.js)
        working-directory: expensy_frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ── 7. Docker build (без push) ────────────────────────────────────────
      # Собираем образ локально с load: true — он доступен только на этом runner'е.
      # push: false — не пушим в registry до прохождения Trivy сканирования.
      # platforms: linux/amd64 — явно указываем архитектуру, важно для Mac с Apple Silicon:
      # локальная разработка идёт на arm64, но кластер Kind использует amd64.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local, no push)
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: expensy_frontend
          file: expensy_frontend/Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          pull: true

      # ── 8. Trivy — сканирование образа ────────────────────────────────────
      # Сканирует собранный Docker образ на CVE уязвимости в OS-пакетах и зависимостях.
      # exit-code: 1 — пайплайн падает при нахождении CRITICAL или HIGH уязвимостей.
      # ignore-unfixed: true — игнорируем уязвимости без доступного фикса
      # (иначе пайплайн будет падать из-за проблем, которые ты не можешь исправить).
      # Образ пушится в registry ТОЛЬКО если Trivy прошёл — нет смысла подписывать уязвимый образ.
      - name: Trivy – Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
        

      # ── 9. Login и push образа в ACR ─────────────────────────────────────
      # Login делаем только здесь — не раньше, чтобы credentials не были доступны
      # в шагах до Trivy (принцип минимальных прав в CI).
      - name: Login to ACR
        run: az acr login --name "${ACR_NAME}"

      - name: Push Docker image to ACR
        id: docker_push
        uses: docker/build-push-action@v6
        with:
          context: expensy_frontend
          file: expensy_frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          pull: true

      # ── 10. Cosign — keyless подпись образа ───────────────────────────────
      # Подписываем образ GitHub Actions OIDC identity без приватного ключа.
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        env:
          IMAGE_DIGEST: ${{ steps.docker_push.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"

      # ── 11. Обновление GitOps манифеста ───────────────────────────────────
      # После успешного push и подписи коммитим новый тег образа в манифест.
      # Argo CD увидит изменение в gitops/ и автоматически задеплоит новую версию.
      # git pull --rebase защищает от race condition если backend CI
      # коммитит одновременно с frontend CI.
      - name: Update image tag in GitOps manifest
        env:
          GIT_SHA: ${{ github.sha }}
          MANIFEST: gitops/yola/frontend/frontend-deployment.yaml
        run: |
          if [ ! -f "$MANIFEST" ]; then
            echo "::warning::$MANIFEST not found — skipping GitOps update."
            exit 0
          fi

          sed -i "s|image: ${{ env.IMAGE_NAME }}:.*|image: ${{ env.IMAGE_NAME }}:${GIT_SHA}|g" "$MANIFEST"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$MANIFEST"

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(gitops): update frontend image to ${GIT_SHA}"

          git pull --rebase origin main

          git push origin main
